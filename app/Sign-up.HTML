<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бүртгэл үүсгэх</title>
    <link rel="stylesheet" href="Sign-up.css">
</head>
<body>
<div class="card">
    <div class="card-header">
        <h2>Бүртгэл үүсгэх</h2>
        <p>Бүртгүүлэхийн тулд мэдээллүүдээ оруулна уу.</p>
    </div>
    <form id="signupForm">
        <div class="field">
            <label for="name">Овог нэр</label>
            <input
                type="text"
                id="name"
                required
                oninvalid="this.setCustomValidity('Овог нэрээ оруулна уу.')"
                oninput="this.setCustomValidity('')"
            >
        </div>
        <div class="field">
            <label for="email">И-мэйл</label>
            <input
                type="email"
                id="email"
                required
                oninvalid="emailValidation(this)"
                oninput="this.setCustomValidity('')"
            >
            <small>
                Бид таны и-мэйл хаягийг зөвхөн тантай холбогдоход ашиглана.
            </small>
        </div>
        <div class="field">
            <label for="password">Нууц үг</label>
            <input
                type="password"
                id="password"
                minlength="8"
                required
                oninvalid="passwordValidation(this)"
                oninput="this.setCustomValidity('')"
            >
            <small>Нууц үг хамгийн багадаа 8 тэмдэгттэй байх ёстой.</small>
        </div>
        <div class="field">
            <label for="confirm-password">Нууц үгээ дахин оруулна уу</label>
            <input
                type="password"
                id="confirm-password"
                required
                oninvalid="this.setCustomValidity('Нууц үгээ дахин оруулна уу.')"
                oninput="this.setCustomValidity('')"
            >
            <small>Нууц үгийг баталгаажуулна уу.</small>
        </div>
        <button class="btn-primary" type="submit">
            Бүртгэл үүсгэх
        </button>
        <button class="btn-outline" type="button">
            Google-р бүртгүүлэх
        </button>
        <p class="login-link">
            Бүртгэлтэй юу?
            <a href="Log-in.HTML">Нэвтрэх</a>
        </p>
    </form>
</div>
<script>
function emailValidation(input) {
    if (input.validity.valueMissing) {
        input.setCustomValidity("И-мэйл хаягаа оруулна уу.");
    } else if (input.validity.typeMismatch) {
        input.setCustomValidity("Зөв и-мэйл хаяг оруулна уу.");
    } else {
        input.setCustomValidity("");
    }
}
function passwordValidation(input) {
    if (input.validity.valueMissing) {
        input.setCustomValidity("Нууц үгээ оруулна уу.");
    } else if (input.validity.tooShort) {
        input.setCustomValidity("Нууц үг хамгийн багадаа 8 тэмдэгттэй байх ёстой.");
    } else {
        input.setCustomValidity("");
    }
}
const form = document.getElementById("signupForm");
form.addEventListener("submit", function(event) {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm-password").value;
    if (password !== confirmPassword) {
        event.preventDefault();
        alert("Нууц үг хоорондоо таарахгүй байна.");
        return;
    }
    event.preventDefault();
    alert("Амжилттай бүртгэгдлээ!");
    window.location.href = "Log-in.HTML";
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <!-- Тусдаа CSS файлаа холбох -->
    <link rel="stylesheet" href="Menu.CSS">
    <!-- FontAwesome Икон суулгах -->
    <link 
      rel="stylesheet" 
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >
</head>
<body>

    <!-- Цэсний үндсэн сав контейнер -->

            <h3 class="menu-title">Цэс</h3>

            <!-- Жагсаалт -->
            <div class="menu-list">
                <a href="#" class="menu-item">
                    <i class="fa-solid fa-gear menu-icon"></i>
                    <span>Тохиргоо</span>
                </a>

                <a href="#" class="menu-item">
                    <i class="fa-solid fa-globe menu-icon"></i>
                    <span>Хэл солих</span>
                </a>

                <a href="#" class="menu-item">
                    <i class="fa-solid fa-user-graduate menu-icon"></i>

                </a>

                    <i class="fa-solid fa-chalkboard-user menu-icon"></i>

                    <i class="fa-solid fa-door-open menu-icon"></i>

                    <i class="fa-solid fa-file-pen menu-icon"></i>

                    <i class="fa-solid fa-address-card menu-icon"></i>

                </a>

                <a href="#" class="menu-item">
                    <i class="fa-solid fa-bullhorn menu-icon"></i>
                    <span>Зарлал</span>
                </a>
            </div>
        </div>

        <!-- Доод талын Гарах товчлуур -->
        <div class="logout-container">
            <a href="#" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket logout-icon"></i>
                <span>Гарах</span>
            </a>
        </div>

    </div>

</body>
</html>
